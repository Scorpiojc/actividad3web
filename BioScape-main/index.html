<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>BioLab Scape</title>

  <style>

    /*
    =========================================
    RESET
    =========================================
    */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /*
    =========================================
    BODY
    =========================================
    */

    body {

      background: #000;

      overflow: hidden;

      width: 100vw;
      height: 100vh;

      display: flex;

      justify-content: center;
      align-items: center;
    }

    /*
    =========================================
    GAME CONTAINER
    =========================================
    */

    #game-container {

      width: 960px;
      height: 540px;
    }

    /*
    =========================================
    CANVAS
    =========================================
    */

    canvas {
      display: block;
    }

  </style>

</head>

<body>

  <!--
  =========================================
  GAME CONTAINER
  =========================================
  -->

  <div id="game-container"></div>

  <!--
  =========================================
  MAIN JS
  =========================================
  -->

  <script
    src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"
  ></script>
  <script
    type="module"
    src="./main.js"
  ></script>
</body>

</html>
